apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert
    kompose.version: 1.35.0 (HEAD)
  labels:
    io.kompose.service: atlantis
  name: atlantis
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: atlantis
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert
        kompose.version: 1.35.0 (HEAD)
      labels:
        io.kompose.service: atlantis
    spec:
      containers:
        - name: atlantis
          image:  azure.azurecr.io/atlantis:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4141
              protocol: TCP
          volumeMounts:
            - mountPath: /atlantis/.ssh
              name: atlantis-cm0
              readOnly: true
            - mountPath: /atlantis/src
              name: atlantis-cm1
              readOnly: true
          args:
            - "server"
            - "--port=4141"
            - "--gh-user=sample-bot@example.com"
            - "--gh-token=ghp_sampletoken0123456789"
            - "--repo-allowlist=github.com/your-org/*"
            - "--repo-config=/usr/local/bin/repos.yaml"
            - "--gh-webhook-secret=sample-webhook-secret"
          env:
            - name: SSH_AUTH_SOCK
              value: /ssh-agent
            # - name: URL
            #   value: https://example.ngrok-free.app
            - name: ARM_CLIENT_ID
              value: ""
            - name: ARM_CLIENT_SECRET 
              value: ""
            - name: ARM_SUBSCRIPTION_ID
              value: ""
            - name: ARM_TENANT_ID
              value: ""
      restartPolicy: Always
      volumes:
        - configMap:
            name: atlantis-cm0
          name: atlantis-cm0
        - configMap:
            name: atlantis-cm1
          name: atlantis-cm1
